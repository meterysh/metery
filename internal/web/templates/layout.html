<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{if .Title}}{{.Title}} — Metery{{else}}Metery{{end}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      color: #24292f;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #d0d7de;
    }
    header .inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      min-height: 52px;
    }
    header .left {
      display: flex;
      align-items: stretch;
      gap: 20px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
    }
    header h1 a { color: inherit; text-decoration: none; }
    header nav {
      display: flex;
      gap: 0;
      align-items: stretch;
    }
    header nav a {
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 13.5px;
      color: #57606a;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .12s;
    }
    header nav a:hover { color: #24292f; }
    header nav a.active { color: #0969da; border-bottom-color: #0969da; font-weight: 500; }
    header .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #57606a;
    }
    header .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #ddf4ff;
      color: #0550ae;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    header a.logout {
      color: #57606a;
      text-decoration: none;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      transition: background .12s, border-color .12s;
    }
    header a.logout:hover { background: #f6f8fa; border-color: #b0b8c1; color: #24292f; }
    main {
      max-width: 1200px;
      margin: 28px auto 40px;
      padding: 0 24px;
    }
    .page-header {
      margin-bottom: 24px;
    }
    .page-header h2 {
      font-size: 24px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -.02em;
      line-height: 1.2;
    }
.defs a { color: #0969da; text-decoration: none; }
    .defs a:hover { text-decoration: underline; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #57606a;
      text-decoration: none;
      margin-bottom: 14px;
    }
    .back-link:hover { color: #0969da; }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #57606a;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 32px 0 12px;
    }

    /* Stat cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 0;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 24px 24px 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .15s, box-shadow .15s;
    }
    .stat-card:hover {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, .08);
    }
    .stat-icon {
      color: #57606a;
      display: flex;
    }
    .stat-number {
      font-size: 40px;
      font-weight: 600;
      color: #24292f;
      line-height: 1;
      letter-spacing: -.02em;
    }
    .stat-label {
      font-size: 13.5px;
      color: #57606a;
      font-weight: 500;
    }

    /* Data cards */
    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 1px 0 rgba(27,31,36,.04);
    }
    .card.padded { padding: 20px 22px; }
    .defs {
      display: grid;
      grid-template-columns: 160px 1fr;
      margin: 0;
      font-size: 13.5px;
    }
    .defs dt, .defs dd {
      padding: 13px 22px;
      border-bottom: 1px solid #eaeef2;
    }
    .defs dt { color: #57606a; font-weight: 500; }
    .defs dd {
      margin: 0;
      color: #24292f;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .defs > dt:nth-last-of-type(1),
    .defs > dt:nth-last-of-type(1) + dd { border-bottom: none; }
    .entitlement-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .entitlement-header a { color: #0969da; text-decoration: none; }
    .entitlement-header a:hover { text-decoration: underline; }
    .small { font-size: 12.5px; }
    table.nested {
      margin: 0 -22px -20px;
      width: calc(100% + 44px);
      border-top: 1px solid #eaeef2;
    }
    table.nested th:first-child, table.nested td:first-child { padding-left: 22px; }
    table.nested th:last-child, table.nested td:last-child { padding-right: 22px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #eaeef2; }
    th { color: #57606a; font-weight: 500; background: #f6f8fa; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    table.compact td, table.compact th { padding: 8px 14px; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f6f8fa; }
    table a { color: #0969da; text-decoration: none; }
    table a:hover { text-decoration: underline; }
    .card > p.muted { padding: 20px 14px; margin: 0; }
    code {
      background: #eaeef2;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active   { background: #dafbe1; color: #116329; }
    .badge-inactive { background: #eaeef2; color: #57606a; }
    .badge-metered  { background: #ddf4ff; color: #0550ae; }
    .badge-boolean  { background: #f1f8ff; color: #57606a; }
    .muted { color: #57606a; }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <div class="left">
        <h1><a href="/">Metery</a></h1>
        <nav>
          <a href="/" {{if eq .ActiveTab "overview"}}class="active"{{end}}>Overview</a>
          <a href="/customers" {{if eq .ActiveTab "customers"}}class="active"{{end}}>Customers</a>
          <a href="/meters" {{if eq .ActiveTab "meters"}}class="active"{{end}}>Meters</a>
          <a href="/features" {{if eq .ActiveTab "features"}}class="active"{{end}}>Features</a>
        </nav>
      </div>
      {{if .User}}
      <div class="user-info">
        <span class="user">
          <span class="avatar">{{slice .User.Email 0 1}}</span>
          {{.User.Email}}
        </span>
        <a class="logout" href="/auth/logout">Logout</a>
      </div>
      {{end}}
    </div>
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>
