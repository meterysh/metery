<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{if .Title}}{{.Title}} — Metery{{else}}Metery{{end}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      color: #24292f;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #d0d7de;
      box-shadow: 0 1px 0 rgba(27,31,36,.04);
    }
    header .inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      min-height: 52px;
    }
    header .left {
      display: flex;
      align-items: stretch;
      gap: 24px;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -.01em;
      display: flex;
      align-items: center;
    }
    header h1 a { color: inherit; text-decoration: none; }
    header nav {
      display: flex;
      gap: 4px;
      align-items: stretch;
    }
    header nav a {
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 14px;
      color: #57606a;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    header nav a:hover { color: #24292f; }
    header nav a.active { color: #0969da; border-bottom-color: #0969da; }
    header .user-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #24292f;
    }
    header .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #eaeef2;
      color: #57606a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    header a.logout {
      color: #57606a;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    header a.logout:hover { background: #f6f8fa; color: #24292f; }
    main {
      max-width: 1200px;
      margin: 20px auto 32px;
      padding: 0 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    h2 { font-size: 18px; margin: 0 0 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #d8dee4; }
    th { color: #57606a; font-weight: 500; background: #f6f8fa; }
    table.compact td, table.compact th { padding: 6px 10px; }
    table a { color: #0969da; text-decoration: none; }
    table a:hover { text-decoration: underline; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active   { background: #dafbe1; color: #116329; }
    .badge-inactive { background: #eaeef2; color: #57606a; }
    .badge-metered  { background: #ddf4ff; color: #0550ae; }
    .badge-boolean  { background: #f1f8ff; color: #57606a; }
    .muted { color: #57606a; }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <div class="left">
        <h1><a href="/">Metery</a></h1>
        <nav>
          <a href="/" {{if eq .ActiveTab "meters"}}class="active"{{end}}>Meters</a>
          <a href="/features" {{if eq .ActiveTab "features"}}class="active"{{end}}>Features</a>
          <a href="/customers" {{if eq .ActiveTab "customers"}}class="active"{{end}}>Customers</a>
        </nav>
      </div>
      {{if .User}}
      <div class="user-info">
        <span class="user">
          <span class="avatar">{{slice .User.Email 0 1}}</span>
          {{.User.Email}}
        </span>
        <a class="logout" href="/auth/logout">Logout</a>
      </div>
      {{end}}
    </div>
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>
