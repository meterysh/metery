<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{if .Title}}{{.Title}} — Metery{{else}}Metery{{end}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <h1 class="text-xl font-extrabold tracking-tight text-gray-900">
          <a href="/" class="flex items-center gap-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 rounded-sm">
            <svg aria-hidden="true" class="w-6 h-6 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            Metery
          </a>
        </h1>
        <nav class="hidden md:flex gap-2">
          <a href="/" class="px-3 py-2 rounded-md text-sm font-medium transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 {{if eq .ActiveTab "overview"}}bg-brand-50 text-brand-700{{else}}text-gray-600 hover:text-gray-900 hover:bg-gray-100{{end}}">Overview</a>
          <a href="/customers" class="px-3 py-2 rounded-md text-sm font-medium transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 {{if eq .ActiveTab "customers"}}bg-brand-50 text-brand-700{{else}}text-gray-600 hover:text-gray-900 hover:bg-gray-100{{end}}">Customers</a>
          <a href="/meters" class="px-3 py-2 rounded-md text-sm font-medium transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 {{if eq .ActiveTab "meters"}}bg-brand-50 text-brand-700{{else}}text-gray-600 hover:text-gray-900 hover:bg-gray-100{{end}}">Meters</a>
          <a href="/features" class="px-3 py-2 rounded-md text-sm font-medium transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 {{if eq .ActiveTab "features"}}bg-brand-50 text-brand-700{{else}}text-gray-600 hover:text-gray-900 hover:bg-gray-100{{end}}">Features</a>
        </nav>
      </div>
      {{if .User}}
      <div class="relative" id="user-menu-container">
        <button type="button" class="flex items-center gap-2 text-sm text-gray-700 hover:bg-gray-50 px-2 py-1.5 rounded-md focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 transition-colors" id="user-menu-button" aria-expanded="false" aria-haspopup="true">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-brand-100 to-brand-200 text-brand-800 flex items-center justify-center font-bold text-xs uppercase shadow-inner border border-brand-200">
            {{slice .User.Email 0 1}}
          </div>
          <span class="hidden sm:inline font-medium">{{.User.Email}}</span>
          <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <div class="absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 divide-y divide-gray-100 hidden z-50 transform opacity-0 scale-95 transition-all duration-100 origin-top-right" role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" tabindex="-1" id="user-menu-dropdown">
          <div class="py-1" role="none">
            <p class="px-4 py-2 text-sm text-gray-500 truncate" role="none">
              Signed in as<br>
              <span class="font-medium text-gray-900 truncate block">{{.User.Email}}</span>
            </p>
          </div>
          <div class="py-1" role="none">
            <a href="/auth/logout" class="group flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900" role="menuitem" tabindex="-1" id="user-menu-item-logout">
              <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Sign out
            </a>
          </div>
        </div>
      </div>
      {{end}}
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">
    {{template "content" .}}
  </main>
  <footer class="border-t border-gray-200 py-6 text-center text-sm text-gray-500 mt-auto">
    <p><a href="/openapi.yaml" class="hover:text-gray-900 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-400 rounded-sm">API Spec</a></p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const button = document.getElementById('user-menu-button');
      const dropdown = document.getElementById('user-menu-dropdown');
      
      if (!button || !dropdown) return;

      const toggleMenu = () => {
        const isExpanded = button.getAttribute('aria-expanded') === 'true';
        button.setAttribute('aria-expanded', !isExpanded);
        
        if (isExpanded) {
          dropdown.classList.add('opacity-0', 'scale-95');
          dropdown.classList.remove('opacity-100', 'scale-100');
          setTimeout(() => dropdown.classList.add('hidden'), 100);
        } else {
          dropdown.classList.remove('hidden');
          // small delay to allow display block to apply before animating opacity
          setTimeout(() => {
            dropdown.classList.remove('opacity-0', 'scale-95');
            dropdown.classList.add('opacity-100', 'scale-100');
          }, 10);
        }
      };

      button.addEventListener('click', toggleMenu);

      // Close when clicking outside
      document.addEventListener('click', (event) => {
        if (!button.contains(event.target) && !dropdown.contains(event.target)) {
          if (button.getAttribute('aria-expanded') === 'true') {
            toggleMenu();
          }
        }
      });
    });
  </script>
</body>
</html>
