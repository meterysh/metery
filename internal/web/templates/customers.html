{{define "content"}}
<div class="mb-8">
  <h2 class="text-2xl font-bold text-gray-900 tracking-tight text-balance">Customers</h2>
</div>
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
  {{if .Customers}}
  <div class="overflow-x-auto">
    <table class="w-full text-left text-sm whitespace-nowrap">
      <thead class="bg-gray-50 text-gray-500 uppercase tracking-wider text-xs font-medium border-b border-gray-200">
        <tr>
          <th class="px-6 py-4">Key</th>
          <th class="px-6 py-4">Name</th>
          <th class="px-6 py-4">Status</th>
          <th class="px-6 py-4">Created</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        {{range .Customers}}
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-3"><a href="/customers/{{.Key}}" class="text-brand-600 hover:text-brand-800 hover:underline font-mono text-xs font-medium tabular-nums">{{.Key}}</a></td>
          <td class="px-6 py-3 text-gray-900 font-medium truncate max-w-xs">{{.Name}}</td>
          <td class="px-6 py-3">
            {{if .Active}}
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 border border-green-200">Active</span>
            {{else}}
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800 border border-gray-200">Deactivated</span>
            {{end}}
          </td>
          <td class="px-6 py-3 text-gray-500 tabular-nums">{{.CreatedAt}}</td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{else}}
  <div class="px-6 py-12 text-center text-gray-500">
    <svg aria-hidden="true" class="mx-auto h-12 w-12 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
    </svg>
    <p>No customers yet.</p>
  </div>
  {{end}}
</div>
{{end}}
