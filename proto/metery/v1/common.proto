syntax = "proto3";

// Shared value types used across multiple Metery services.
package metery.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/meterysh/metery/gen/go/metery/v1;meteryv1";

// A recurring time window: a duration plus an alignment anchor.
// Durations are ISO-8601 strings ("P1M", "P1Y", "PT1H") rather than
// google.protobuf.Duration because billing periods are calendar-aware —
// "one month" varies in length and can't be expressed in fixed seconds.
message Period {
  string duration = 1 [(buf.validate.field).string.pattern = "^P.+$"]; // e.g. "P1M"
  google.protobuf.Timestamp anchor = 2;
}

message Recurrence {
  string interval = 1 [(buf.validate.field).string.pattern = "^P.+$"]; // ISO-8601, e.g. "P1M"
  google.protobuf.Timestamp anchor = 2;
}

message Expiration {
  string duration = 1 [(buf.validate.field).string.pattern = "^P.+$"]; // ISO-8601, e.g. "P1M"
}

message Rollover {
  int64 max_amount = 1 [(buf.validate.field).int64.gte = 0];
  // Allowed: "original" (cap at original grant amount),
  //          "remaining" (cap at unused-at-reset amount).
  string type = 2 [(buf.validate.field).string = {in: ["original", "remaining"]}];
}

message TimeWindow {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
}
