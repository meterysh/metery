syntax = "proto3";

// Grants add credits to a metered entitlement. Boolean features cannot
// receive grants — those are validated at service boundary.
package metery.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "metery/v1/common.proto";

option go_package = "github.com/meterysh/metery/gen/go/metery/v1;meteryv1";

message Grant {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
  string entitlement_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
  int64 amount = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
  int32 priority = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ]; // lower number burns first
  Recurrence recurrence = 5; // optional
  Rollover rollover = 6; // optional
  google.protobuf.Struct metadata = 7;
  google.protobuf.Timestamp created_at = 8 [(buf.validate.field).required = true];
  google.protobuf.Timestamp effective_at = 9 [(buf.validate.field).required = true];
  google.protobuf.Timestamp expires_at = 10; // null = no expiration
  google.protobuf.Timestamp voided_at = 11; // null on active grants
  // parent_grant_id (recurrence lineage) is server-internal storage —
  // not exposed on the wire. See docs/design.md §7.
}

service GrantService {
  rpc CreateGrant(CreateGrantRequest) returns (CreateGrantResponse) {
    option (google.api.http) = {
      post: "/v1/customers/{customer_id_or_key}/entitlements/{feature_id_or_slug}/grants"
      body: "*"
      response_body: "grant"
    };
  }
  rpc ListGrants(ListGrantsRequest) returns (ListGrantsResponse) {
    option (google.api.http) = {
      get: "/v1/customers/{customer_id_or_key}/entitlements/{feature_id_or_slug}/grants"
      response_body: "grants"
    };
  }
  rpc VoidGrant(VoidGrantRequest) returns (VoidGrantResponse) {
    option (google.api.http) = {delete: "/v1/grants/{id}"};
  }
}

message CreateGrantRequest {
  string customer_id_or_key = 1 [(buf.validate.field).required = true];
  string feature_id_or_slug = 2 [(buf.validate.field).required = true];
  int64 amount = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
  // Default 100 if absent. 0 is valid (highest priority).
  optional int32 priority = 4 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];
  Expiration expiration = 5; // optional
  Recurrence recurrence = 6; // optional
  Rollover rollover = 7; // optional
  google.protobuf.Struct metadata = 8;
  google.protobuf.Timestamp effective_at = 9; // default now
}
message CreateGrantResponse {
  Grant grant = 1 [(buf.validate.field).required = true];
}

message ListGrantsRequest {
  string customer_id_or_key = 1 [(buf.validate.field).required = true];
  string feature_id_or_slug = 2 [(buf.validate.field).required = true];
  bool include_voided = 3;
  optional int32 limit = 4 [(buf.validate.field).int32 = {
    gt: 0
    lte: 1000
  }];
  optional string after = 5 [(buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"];
}
message ListGrantsResponse {
  repeated Grant grants = 1;
}

message VoidGrantRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[0-7][0-9a-hjkmnp-tv-z]{25}$"
  ];
}
message VoidGrantResponse {}
