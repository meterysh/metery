syntax = "proto3";

// Features are named capabilities. Metered features have their own
// credit ledger; boolean features encode a yes/no entitlement.
package metery.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/meterysh/metery/gen/go/metery/v1;meteryv1";

// Allowed feature `type` values. Wire format is plain string for clean
// JSON output; validation enforces the closed set.
//   - "metered": has a credit ledger; supports grants and usage events.
//   - "boolean": yes/no entitlement; no balance.

message Feature {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {max_len: 64, pattern: "^[a-z][a-z0-9_]*$"}
  ]; // slug, e.g. "api_calls"
  string type = 2 [(buf.validate.field).string = {in: ["metered", "boolean"]}];
  string display_name = 3 [(buf.validate.field).required = true];
  string unit = 4; // required for metered, empty for boolean (cross-field check)
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp archived_at = 6;
}

service FeatureService {
  rpc CreateFeature(CreateFeatureRequest) returns (CreateFeatureResponse) {
    option (google.api.http) = {
      post: "/v1/features"
      body: "*"
      response_body: "feature"
    };
  }
  rpc GetFeature(GetFeatureRequest) returns (GetFeatureResponse) {
    option (google.api.http) = {
      get: "/v1/features/{id}"
      response_body: "feature"
    };
  }
  rpc ListFeatures(ListFeaturesRequest) returns (ListFeaturesResponse) {
    option (google.api.http) = {get: "/v1/features"};
  }
  rpc ArchiveFeature(ArchiveFeatureRequest) returns (ArchiveFeatureResponse) {
    option (google.api.http) = {delete: "/v1/features/{id}"};
  }
}

message CreateFeatureRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {max_len: 64, pattern: "^[a-z][a-z0-9_]*$"}
  ];
  string type = 2 [(buf.validate.field).string = {in: ["metered", "boolean"]}];
  string display_name = 3 [(buf.validate.field).required = true];
  string unit = 4; // required for metered; ignored for boolean
}
message CreateFeatureResponse {
  Feature feature = 1;
}

message GetFeatureRequest {
  string id = 1;
}
message GetFeatureResponse {
  Feature feature = 1;
}

message ListFeaturesRequest {
  bool include_archived = 1;
  optional int32 limit = 2 [(buf.validate.field).int32 = {gt: 0, lte: 1000}];
  optional string cursor = 3;
}
message ListFeaturesResponse {
  repeated Feature features = 1;
  string next_cursor = 2;
}

message ArchiveFeatureRequest {
  string id = 1;
}
message ArchiveFeatureResponse {}
