syntax = "proto3";

// Entitlements bind a customer to a feature. For metered features they
// carry usage-period config; for boolean features the row's existence is
// the access bit.
package metery.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "metery/v1/common.proto";

option go_package = "github.com/meterysh/metery/gen/go/metery/v1;meteryv1";

message Entitlement {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string customer_id = 2 [(buf.validate.field).required = true];
  string feature_id = 3 [(buf.validate.field).required = true];
  Period usage_period = 4; // optional; metered features only
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp deleted_at = 6;
}

// Type-discriminated value response. Caller does not need to know the
// feature's type ahead of time.
//
// All `optional` fields below are populated only when type == "metered".
message EntitlementValue {
  // "metered" or "boolean".
  string type = 1 [(buf.validate.field).string = {in: ["metered", "boolean"]}];
  // True when access should be allowed for the requested cost (or any
  // access at all for boolean / cost-omitted metered reads).
  bool has_access = 2;
  // Remaining credits in the current period. May be negative under
  // concurrent overspend (v0 — see design §9).
  optional int64 balance = 3;
  // Credits consumed in the current period (after the last reset).
  optional int64 usage = 4;
  // Excess consumption beyond granted credits: max(0, -balance).
  // Useful for overage-pricing and out-of-quota reporting.
  optional int64 overage = 5;
  // Period boundaries currently in effect. Empty for entitlements with
  // no usage_period.
  TimeWindow usage_period = 6;
  // When the usage counter last started fresh — either via period
  // rollover or an explicit ResetEntitlement call.
  google.protobuf.Timestamp last_reset = 7;
}

service EntitlementService {
  rpc CreateEntitlement(CreateEntitlementRequest) returns (CreateEntitlementResponse) {
    option (google.api.http) = {
      post: "/v1/customers/{customer_id}/entitlements"
      body: "*"
      response_body: "entitlement"
    };
  }
  rpc GetEntitlement(GetEntitlementRequest) returns (GetEntitlementResponse) {
    option (google.api.http) = {
      get: "/v1/customers/{customer_id}/entitlements/{feature_id}"
      response_body: "entitlement"
    };
  }
  rpc ListEntitlements(ListEntitlementsRequest) returns (ListEntitlementsResponse) {
    option (google.api.http) = {get: "/v1/customers/{customer_id}/entitlements"};
  }
  rpc DeleteEntitlement(DeleteEntitlementRequest) returns (DeleteEntitlementResponse) {
    option (google.api.http) = {delete: "/v1/customers/{customer_id}/entitlements/{feature_id}"};
  }

  // Hot-path read: "can customer do this, and what's their balance?"
  rpc GetEntitlementValue(GetEntitlementValueRequest) returns (GetEntitlementValueResponse) {
    option (google.api.http) = {
      get: "/v1/customers/{customer_id}/entitlements/{feature_id}/value"
      response_body: "value"
    };
  }

  // Manual reset of usage counters (admin/upgrade flow). Metered only.
  // Returns empty on success — caller refetches GetEntitlementValue if
  // they want post-reset state.
  rpc ResetEntitlement(ResetEntitlementRequest) returns (ResetEntitlementResponse) {
    option (google.api.http) = {
      post: "/v1/customers/{customer_id}/entitlements/{feature_id}/reset"
      body: "*"
    };
  }
}

message CreateEntitlementRequest {
  string customer_id = 1 [(buf.validate.field).required = true];
  string feature_id = 2 [(buf.validate.field).required = true];
  Period usage_period = 3; // optional; metered only
}
message CreateEntitlementResponse {
  Entitlement entitlement = 1;
}

message GetEntitlementRequest {
  string customer_id = 1 [(buf.validate.field).required = true];
  string feature_id = 2 [(buf.validate.field).required = true];
}
message GetEntitlementResponse {
  Entitlement entitlement = 1;
}

message ListEntitlementsRequest {
  string customer_id = 1 [(buf.validate.field).required = true];
  int32 limit = 2 [(buf.validate.field).int32 = {gte: 0, lte: 1000}];
  string cursor = 3;
}
message ListEntitlementsResponse {
  repeated Entitlement entitlements = 1;
  string next_cursor = 2;
}

message DeleteEntitlementRequest {
  string customer_id = 1 [(buf.validate.field).required = true];
  string feature_id = 2 [(buf.validate.field).required = true];
}
message DeleteEntitlementResponse {}

message GetEntitlementValueRequest {
  string customer_id = 1 [(buf.validate.field).required = true];
  string feature_id = 2 [(buf.validate.field).required = true];
  // For metered: the cost being checked. Defaults to 1 if absent. Ignored for boolean.
  optional int64 cost = 3 [(buf.validate.field).int64.gte = 0];
  // Optional point-in-time read; defaults to now.
  google.protobuf.Timestamp at = 4;
}
message GetEntitlementValueResponse {
  EntitlementValue value = 1;
}

message ResetEntitlementRequest {
  string customer_id = 1 [(buf.validate.field).required = true];
  string feature_id = 2 [(buf.validate.field).required = true];
  google.protobuf.Timestamp at = 3; // optional
}
message ResetEntitlementResponse {}
