version: 2
before:
  hooks:
    - buf generate
builds:
  - main: ./cmd/metery
    binary: metery
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    goarch:
      - amd64
      - arm64
    goos:
      - linux
      - darwin
      - windows
dockers_v2:
  - images:
      - ghcr.io/meterysh/metery
      - meterysh/metery
    extra_files:
      - public/
    tags:
      - "{{ .Tag }}"
      - latest
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.name": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
brews:
  - repository:
      owner: meterysh
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "Self-hosted usage-billing and entitlements backend"
    homepage: "https://github.com/meterysh/metery"
    license: "Apache-2.0"
changelog:
  disable: true