version: 2
before:
  hooks:
    - buf generate
builds:
  - main: ./cmd/metery
    binary: metery
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    goarch:
      - amd64
      - arm64
    goos:
      - linux
      - darwin
      - windows
dockers:
  - goos: linux
    goarch: amd64
    image_templates:
      - ghcr.io/meterysh/metery:{{ .Tag }}-amd64
      - meterysh/metery:{{ .Tag }}-amd64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.name={{ .ProjectName }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
  - goos: linux
    goarch: arm64
    image_templates:
      - ghcr.io/meterysh/metery:{{ .Tag }}-arm64
      - meterysh/metery:{{ .Tag }}-arm64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.name={{ .ProjectName }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
docker_manifests:
  - name_template: ghcr.io/meterysh/metery:{{ .Tag }}
    image_templates:
      - ghcr.io/meterysh/metery:{{ .Tag }}-amd64
      - ghcr.io/meterysh/metery:{{ .Tag }}-arm64
  - name_template: ghcr.io/meterysh/metery:latest
    image_templates:
      - ghcr.io/meterysh/metery:{{ .Tag }}-amd64
      - ghcr.io/meterysh/metery:{{ .Tag }}-arm64
  - name_template: meterysh/metery:{{ .Tag }}
    image_templates:
      - meterysh/metery:{{ .Tag }}-amd64
      - meterysh/metery:{{ .Tag }}-arm64
  - name_template: meterysh/metery:latest
    image_templates:
      - meterysh/metery:{{ .Tag }}-amd64
      - meterysh/metery:{{ .Tag }}-arm64
brews:
  - repository:
      owner: meterysh
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "Self-hosted usage-billing and entitlements backend"
    homepage: "https://github.com/meterysh/metery"
    license: "Apache-2.0"
changelog:
  disable: true
